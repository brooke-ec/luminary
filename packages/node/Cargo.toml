[package]
name = "luminary-node"
edition = "2024"

[dependencies]
tower-sessions-sqlx-store = { version = "0.15.0", features = ["sqlite"] }
tokio = { workspace = true, features = ["rt-multi-thread", "macros"] }
uuid = { version = "1.21.0", features = ["serde", "v4"] }
luminary-macros = { path = "../macros" }
luminary-core = { path = "../core" }
futures-util = { workspace = true }
serde = { workspace = true }
eyre = { workspace = true }
password-auth = "1.0.0"
async-stream = "0.3.6"
axum-login = "0.18.0"
json-patch = "4.1.0"
thiserror = "2.0.18"
serde_json = "1.0"
dotenv = "0.15"
axum = "0.8"
sqlx = { version = "0.8.6", features = [
    "runtime-tokio",
    "sqlite",
    "macros",
    "migrate",
    "uuid",
] }

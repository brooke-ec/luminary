[package]
name = "luminary-node"
edition = "2021"

[dependencies]
bollard = { version = "0.16.1", features = ["chrono"] }
color-eyre = "0.6.3"
eyre = "0.6.12"
futures-util = "0.3.31"
serde = "1.0.219"
serde_json = "1.0.140"
specta = { version = "1.0.5", features = ["functions"] }
tokio = { version = "1", features = ["rt-multi-thread", "macros"] }
tokio-tungstenite = "0.26.2"
luminary-macros = { workspace = true }
phf = "0.12.1"

[package]
name = "luminary-node"
edition = "2024"

[dependencies]
specta = { version = "1.0.5", features = ["functions"] }
bollard = { version = "0.20.1", features = ["chrono"] }
luminary-macros = { path = "../macros" }
docker-compose-types = "0.22.0"
serde-saphyr = "0.0.19"
serde_json = "1.0.149"
color-eyre = "0.6.5"
itertools = "0.14.0"
serde = "1.0.228"
dotenv = "0.15.0"
axum = "0.8.8"
envy = "0.4.2"
tokio = { version = "1.49.0", features = [
    "rt-multi-thread",
    "macros",
    "process",
    "fs",
] }

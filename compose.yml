services:
  luminary:
    image: ghcr.io/brooke-ec/luminary:latest
    container_name: luminary
    restart: unless-stopped
    ports:
      - 9000:9000
    volumes:
      - ${LUMINARY_PROJECT_DIRECTORY}:${LUMINARY_PROJECT_DIRECTORY}
      - /var/run/docker.sock:/var/run/docker.sock
      - ./data:/opt/app/data
    env_file: .env

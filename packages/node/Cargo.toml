[package]
name = "luminary-node"
version = { workspace = true }
edition = { workspace = true }

[dependencies]
tokio = { workspace = true, features = ["rt-multi-thread", "macros"] }
uuid = { version = "1.21.0", features = ["serde", "v4"] }
luminary-macros = { path = "../macros" }
luminary-core = { path = "../core" }
futures-util = { workspace = true }
serde = { workspace = true }
eyre = { workspace = true }
log = { workspace = true }
password-auth = "1.0.0"
async-stream = "0.3.6"
json-patch = "4.1.0"
serde_json = "1.0"
dotenv = "0.15"
tracing-subscriber = { version = "0.3.22", features = [
    "env-filter",
    "tracing-log",
] }
salvo = { version = "0.89.1", features = [
    "affix-state",
    "eyre",
    "oapi",
    "sse",
] }
sqlx = { version = "0.8.6", features = [
    "runtime-tokio",
    "sqlite",
    "migrate",
    "uuid",
] }

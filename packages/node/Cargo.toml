[package]
name = "luminary-node"
version = { workspace = true }
edition = { workspace = true }

[dependencies]
salvo = { version = "0.89.1", features = ["affix-state", "oapi", "sse"] }
tokio = { workspace = true, features = ["rt-multi-thread", "macros"] }
uuid = { version = "1.21.0", features = ["serde", "v4"] }
luminary-macros = { path = "../macros" }
luminary-core = { path = "../core" }
futures-util = { workspace = true }
serde = { workspace = true }
eyre = { workspace = true }
log = { workspace = true }
password-auth = "1.0.0"
async-stream = "0.3.6"
rand_chacha = "0.3.1"
json-patch = "4.1.0"
serde_json = "1.0"
dotenvy = "0.15"
hex = "0.4.3"
tracing-subscriber = { version = "0.3.22", features = [
    "env-filter",
    "tracing-log",
] }
sqlx = { version = "0.8", features = [
    "runtime-tokio",
    "sqlite",
    "migrate",
    "uuid",
] }

[package]
name = "luminary-node"
edition = "2021"

[dependencies]
axum = "0.8.8"
bollard = { version = "0.20.1", features = ["chrono"] }
color-eyre = "0.6.5"
serde = "1.0.228"
serde_json = "1.0.149"
specta = { version = "1.0.5", features = ["functions"] }
luminary-macros = { path = "../macros" }
tokio = { version = "1.49.0", features = [
    "rt-multi-thread",
    "macros",
    "process",
] }

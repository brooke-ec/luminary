[package]
name = "luminary-node"
edition = "2021"

[dependencies]
axum = "0.8.8"
bollard = { version = "0.16.1", features = ["chrono"] }
color-eyre = "0.6.3"
eyre = "0.6.12"
serde = "1.0.219"
serde_json = "1.0.140"
specta = { version = "1.0.5", features = ["functions"] }
tokio = { version = "1", features = ["rt-multi-thread", "macros"] }

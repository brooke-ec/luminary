[package]
name = "luminary-node"
version = { workspace = true }
edition = { workspace = true }

[dependencies]
salvo = { version = "0.89.1", features = ["affix-state", "oapi", "sse"] }
uuid = { version = "1.21.0", features = ["serde", "v4"] }
bollard = { version = "0.20", features = ["chrono"] }
luminary-macros = { path = "./macros" }
docker-compose-types = "0.22"
password-auth = "1.0.0"
async-stream = "0.3.6"
rand_chacha = "0.3.1"
futures-util = "0.3"
json-patch = "4.1.0"
serde-saphyr = "0.0"
serde_json = "1.0"
dotenvy = "0.15"
base64 = "0.22"
log = "0.4.29"
serde = "1.0"
hex = "0.4.3"
eyre = "0.6"
envy = "0.4"
bytes = "1"

tokio = { version = "1.49", features = [
    "rt-multi-thread",
    "macros",
    "process",
    "sync",
    "fs",
] }

tracing-subscriber = { version = "0.3.22", features = [
    "env-filter",
    "tracing-log",
] }

sqlx = { version = "0.8", features = [
    "runtime-tokio",
    "sqlite",
    "migrate",
    "uuid",
] }
